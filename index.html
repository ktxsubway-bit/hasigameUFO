<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>탕탕 이모지 특공대 - 그레이 에디션</title>
    <style>
        :root {
            --primary-bg: #e2e8f0; /* 배경 레이어 */
            --canvas-bg: #f8fafc;  /* 실제 게임 배경 (연한 회색) */
            --accent-color: #475569; /* 메인 포인트 (짙은 회색) */
            --player-bullet: #64748b;
            --danger-color: #e11d48;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --ui-bg: rgba(255, 255, 255, 0.9);
            --border-color: #cbd5e1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 800px;
            background-color: var(--canvas-bg);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border-radius: 0;
        }

        @media (min-width: 600px) {
            #game-container {
                border-radius: 28px;
                height: 90vh;
                border: 4px solid #ffffff;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #exp-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #cbd5e1;
            z-index: 6;
        }

        #exp-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #64748b, #94a3b8);
            transition: width 0.3s ease-out;
        }

        #ui-layer {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 5;
        }

        .stat-box {
            background-color: var(--ui-bg);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score-display {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 2px;
        }

        #level-display {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        #hp-bar-container {
            width: 110px;
            height: 10px;
            background-color: #cbd5e1;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }

        #hp-bar {
            width: 100%;
            height: 100%;
            background: #475569;
            transition: width 0.2s;
        }

        #joystick-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
        }

        .joystick-base {
            position: absolute;
            width: 90px;
            height: 90px;
            background-color: rgba(15, 23, 42, 0.05);
            border: 2px dashed rgba(15, 23, 42, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
        }

        .joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 36px;
            height: 36px;
            background-color: var(--accent-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(248, 250, 252, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        button {
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 700;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(71, 85, 105, 0.2);
            transition: all 0.2s;
        }

        button:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .skill-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 340px;
        }

        .skill-card {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .skill-card:hover {
            border-color: var(--accent-color);
            background-color: #f1f5f9;
            transform: translateX(5px);
        }

        .skill-icon { font-size: 1.8rem; margin-right: 18px; }
        .skill-info h3 { margin: 0; font-size: 1rem; color: var(--text-main); }
        .skill-info p { margin: 4px 0 0 0; font-size: 0.8rem; color: var(--text-muted); }

        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 8;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="exp-bar-container"><div id="exp-bar"></div></div>
        <div id="damage-flash"></div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="joystick-zone">
            <div class="joystick-base" id="joystick-base">
                <div class="joystick-stick" id="joystick-stick"></div>
            </div>
        </div>

        <div id="ui-layer">
            <div class="stat-box">
                <div id="level-display">LV.<span id="level">1</span></div>
                <div id="score-display"><span id="score">0</span> KILLS</div>
            </div>
            <div class="stat-box">
                <div style="font-weight: 800; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.05em;">HEALTH</div>
                <div id="hp-bar-container">
                    <div id="hp-bar"></div>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <div style="font-size: 4rem; margin-bottom: 20px;">🛸</div>
            <h1>이모지 특공대</h1>
            <p>회면 어디든 드래그하여 이동하세요.<br>자동 공격 시스템이 준비되었습니다.</p>
            <button id="start-btn">작전 시작</button>
        </div>

        <!-- Level Up Screen -->
        <div id="level-up-screen" class="overlay" style="display: none;">
            <h1 style="font-size: 1.5rem; margin-bottom: 20px;">업그레이드 선택</h1>
            <div class="skill-container" id="skill-container"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay" style="display: none;">
            <h1 style="color: var(--danger-color);">작전 중단</h1>
            <p>본부와의 연결이 끊어졌습니다.<br>기록: <span id="final-level" style="font-weight: 800;">1</span> 레벨</p>
            <button id="restart-btn">재출격</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const expBarElement = document.getElementById('exp-bar');
        const hpBarElement = document.getElementById('hp-bar');
        const damageFlash = document.getElementById('damage-flash');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const levelUpScreen = document.getElementById('level-up-screen');
        const skillContainer = document.getElementById('skill-container');

        let CANVAS_WIDTH, CANVAS_HEIGHT;
        let isGameRunning = false;
        let isPaused = false;
        let lastTime = 0;
        let score = 0;
        let gameTime = 0;
        let camera = { x: 0, y: 0 };

        const player = {
            x: 0, y: 0, size: 40, hp: 100, maxHp: 100,
            emoji: '🛸', level: 1, exp: 0, maxExp: 5,
            skills: { damage: 15, fireRate: 0.4, speed: 230, projectiles: 1, range: 350 },
            shootTimer: 0
        };

        const SKILL_POOL = [
            { name: "파워 증가", desc: "공격력이 8 증가합니다.", icon: "💎", apply: () => player.skills.damage += 8 },
            { name: "연사 속도", desc: "재장전 속도가 빨라집니다.", icon: "⚙️", apply: () => player.skills.fireRate = Math.max(0.12, player.skills.fireRate - 0.05) },
            { name: "부스터 장착", desc: "이동 속도가 대폭 상승합니다.", icon: "👟", apply: () => player.skills.speed += 50 },
            { name: "추가 포문", desc: "발사 탄환 개수가 추가됩니다.", icon: "💠", apply: () => player.skills.projectiles += 1 },
            { name: "자가 수리", desc: "체력을 절반 회복합니다.", icon: "🔧", apply: () => player.hp = Math.min(player.maxHp, player.hp + 50) },
            { name: "정밀 레이더", desc: "사거리 및 명중을 개선합니다.", icon: "🎯", apply: () => player.skills.range += 80 }
        ];

        let enemies = [], bullets = [], particles = [], gems = [];
        let keys = { w: false, a: false, s: false, d: false };
        let joystick = { active: false, x: 0, y: 0, dx: 0, dy: 0 };

        function resize() {
            const container = document.getElementById('game-container');
            CANVAS_WIDTH = container.clientWidth;
            CANVAS_HEIGHT = container.clientHeight;
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        const joystickZone = document.getElementById('joystick-zone');
        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');

        joystickZone.addEventListener('touchstart', e => {
            if (!isGameRunning || isPaused) return;
            const t = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            joystick.active = true;
            joystick.x = t.clientX - rect.left;
            joystick.y = t.clientY - rect.top;
            joystickBase.style.display = 'block';
            joystickBase.style.left = joystick.x + 'px';
            joystickBase.style.top = joystick.y + 'px';
        });

        joystickZone.addEventListener('touchmove', e => {
            if (!joystick.active) return;
            e.preventDefault();
            const t = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            const curX = t.clientX - rect.left;
            const curY = t.clientY - rect.top;
            const dx = curX - joystick.x;
            const dy = curY - joystick.y;
            const dist = Math.hypot(dx, dy);
            const max = 35;
            const angle = Math.atan2(dy, dx);
            const clampedDist = Math.min(dist, max);
            joystick.dx = (Math.cos(angle) * clampedDist) / max;
            joystick.dy = (Math.sin(angle) * clampedDist) / max;
            joystickStick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*clampedDist}px), calc(-50% + ${Math.sin(angle)*clampedDist}px))`;
        });

        joystickZone.addEventListener('touchend', () => {
            joystick.active = false; joystick.dx = 0; joystick.dy = 0;
            joystickBase.style.display = 'none';
        });

        function spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(CANVAS_WIDTH, CANVAS_HEIGHT) * 0.75;
            const types = [
                { e: '🌚', hp: 25, spd: 80, exp: 1 },
                { e: '🌑', hp: 45, spd: 60, exp: 2 },
                { e: '🌪️', hp: 15, spd: 140, exp: 1 }
            ];
            const t = types[Math.floor(Math.random() * types.length)];
            enemies.push({
                x: player.x + Math.cos(angle) * dist,
                y: player.y + Math.sin(angle) * dist,
                hp: t.hp * (1 + gameTime/150),
                spd: t.spd * (1 + gameTime/300),
                emoji: t.e, exp: t.exp
            });
        }

        function createExplosion(x, y, color = '#64748b') {
            for(let i=0; i<6; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*200, vy: (Math.random()-0.5)*200,
                    life: 0.5, color, size: 2 + Math.random()*3
                });
            }
        }

        function update(dt) {
            if (isPaused) return;
            gameTime += dt;

            let mx = 0, my = 0;
            if (keys.w) my -= 1; if (keys.s) my += 1;
            if (keys.a) mx -= 1; if (keys.d) mx += 1;
            if (joystick.active) { mx = joystick.dx; my = joystick.dy; }
            const mag = Math.hypot(mx, my);
            if (mag > 0.05) {
                player.x += (mx/mag) * player.skills.speed * dt;
                player.y += (my/mag) * player.skills.speed * dt;
            }

            camera.x += (player.x - camera.x) * 5 * dt;
            camera.y += (player.y - camera.y) * 5 * dt;

            player.shootTimer += dt;
            if (player.shootTimer >= player.skills.fireRate) {
                let target = null, minDist = player.skills.range;
                enemies.forEach(e => {
                    const d = Math.hypot(e.x - player.x, e.y - player.y);
                    if (d < minDist) { minDist = d; target = e; }
                });
                if (target) {
                    const angle = Math.atan2(target.y - player.y, target.x - player.x);
                    for(let i=0; i<player.skills.projectiles; i++) {
                        const a = angle + (i - (player.skills.projectiles-1)/2) * 0.15;
                        bullets.push({
                            x: player.x, y: player.y, vx: Math.cos(a)*600, vy: Math.sin(a)*600,
                            damage: player.skills.damage, life: 1.0
                        });
                    }
                    player.shootTimer = 0;
                }
            }

            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
                if (b.life < 0) { bullets.splice(i, 1); continue; }
                for(let j=enemies.length-1; j>=0; j--) {
                    const e = enemies[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 30) {
                        e.hp -= b.damage;
                        bullets.splice(i, 1);
                        createExplosion(b.x, b.y);
                        if (e.hp <= 0) {
                            gems.push({ x: e.x, y: e.y, exp: e.exp });
                            enemies.splice(j, 1);
                            score++;
                        }
                        break;
                    }
                }
            }

            if (Math.random() < dt * (1.0 + gameTime/50)) spawnEnemy();
            enemies.forEach(e => {
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.spd * dt;
                e.y += Math.sin(angle) * e.spd * dt;
                if (Math.hypot(e.x - player.x, e.y - player.y) < 30) {
                    player.hp -= 25 * dt;
                    damageFlash.style.opacity = 0.4;
                    setTimeout(() => damageFlash.style.opacity = 0, 50);
                }
            });

            for(let i=gems.length-1; i>=0; i--) {
                const g = gems[i];
                const d = Math.hypot(g.x - player.x, g.y - player.y);
                if (d < 200) {
                    g.x += (player.x - g.x) * 12 * dt;
                    g.y += (player.y - g.y) * 12 * dt;
                    if (d < 25) {
                        player.exp += g.exp;
                        gems.splice(i, 1);
                        if (player.exp >= player.maxExp) levelUp();
                    }
                }
            }

            particles.forEach((p, i) => {
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                if (p.life < 0) particles.splice(i, 1);
            });

            if (player.hp <= 0) endGame();
            updateUI();
        }

        function levelUp() {
            player.level++;
            player.exp = 0;
            player.maxExp = Math.floor(player.maxExp * 1.4);
            isPaused = true;
            const selected = SKILL_POOL.sort(() => 0.5 - Math.random()).slice(0, 3);
            skillContainer.innerHTML = '';
            selected.forEach(s => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.innerHTML = `<div class="skill-icon">${s.icon}</div><div class="skill-info"><h3>${s.name}</h3><p>${s.desc}</p></div>`;
                card.onclick = () => { s.apply(); isPaused = false; levelUpScreen.style.display = 'none'; };
                skillContainer.appendChild(card);
            });
            levelUpScreen.style.display = 'flex';
        }

        function updateUI() {
            scoreElement.innerText = score;
            levelElement.innerText = player.level;
            hpBarElement.style.width = Math.max(0, player.hp / player.maxHp * 100) + '%';
            expBarElement.style.width = (player.exp / player.maxExp * 100) + '%';
        }

        function draw() {
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.save();
            ctx.translate(CANVAS_WIDTH/2 - camera.x, CANVAS_HEIGHT/2 - camera.y);

            // 미니멀 그리드
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            const gridSize = 100;
            const startX = Math.floor((camera.x - CANVAS_WIDTH/2) / gridSize) * gridSize - gridSize;
            const endX = Math.floor((camera.x + CANVAS_WIDTH/2) / gridSize) * gridSize + gridSize;
            const startY = Math.floor((camera.y - CANVAS_HEIGHT/2) / gridSize) * gridSize - gridSize;
            const endY = Math.floor((camera.y + CANVAS_HEIGHT/2) / gridSize) * gridSize + gridSize;
            for(let x = startX; x <= endX; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
            }
            for(let y = startY; y <= endY; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
            }

            // 보석 (에너지 파편)
            gems.forEach(g => {
                ctx.fillStyle = '#94a3b8';
                ctx.beginPath(); ctx.roundRect(g.x-4, g.y-4, 8, 8, 2); ctx.fill();
            });

            // 적
            ctx.font = '32px serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            enemies.forEach(e => { ctx.fillText(e.emoji, e.x, e.y); });

            // 탄환 (그레이 캡슐)
            bullets.forEach(b => {
                ctx.fillStyle = '#475569';
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
            });

            // 파티클
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // 플레이어
            ctx.font = '42px serif';
            ctx.fillText(player.emoji, player.x, player.y);
            
            // 사거리 원
            ctx.strokeStyle = 'rgba(71, 85, 105, 0.05)';
            ctx.beginPath(); ctx.arc(player.x, player.y, player.skills.range, 0, Math.PI*2); ctx.stroke();

            ctx.restore();
        }

        function gameLoop(time) {
            if (!isGameRunning) return;
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            player.x = 0; player.y = 0; player.hp = 100; player.level = 1; player.exp = 0;
            player.skills = { damage: 15, fireRate: 0.4, speed: 230, projectiles: 1, range: 350 };
            enemies = []; bullets = []; gems = []; score = 0; gameTime = 0;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            isGameRunning = true; isPaused = false;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameRunning = false;
            document.getElementById('final-level').innerText = player.level;
            gameOverScreen.style.display = 'flex';
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;
    </script>
</body>
</html>
